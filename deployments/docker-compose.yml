services:
  lockr:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    image: lockr:local
    ports:
      - "8300:8300"
    volumes:
      - lockr_data:/var/lib/lockr
      - ./config.yml:/etc/lockr/config.yml:ro
      - ./policies:/etc/lockr/policies:ro
      - ./tls:/etc/lockr/tls:ro
    environment:
      LOCKR_PASSPHRASE: ${LOCKR_PASSPHRASE:?set LOCKR_PASSPHRASE in your environment or .env file}
    restart: unless-stopped
    stop_grace_period: 15s
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "lockr",
          "status",
          "--addr",
          "https://localhost:8300",
          "--ca",
          "/etc/lockr/tls/ca.crt"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  lockr_data:
